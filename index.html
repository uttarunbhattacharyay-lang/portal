<!DOCTYPE html>
<html>
<head>
  <title>Work Portal</title>
  <style>
    body { font-family: Arial; margin: 0; }
    
    .topbar {
      padding: 10px;
      background: black;
      display: flex;
      gap: 10px;
    }

    button {
      padding: 10px;
      color: white;
      background: #333;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    .container {
      height: calc(100vh - 60px);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>

<body>

<div class="topbar">
  <button onclick="openSite('https://app.asanify.com')">Asanify</button>
  <button onclick="openSite('https://app.teamwork.com')">Teamwork</button>
  <button onclick="openSite('https://app.asana.com')">Asana</button>
  <button onclick="openYouTube()">YouTube</button>
</div>

<div class="container">
  <iframe id="frame" src="https://app.asana.com"></iframe>
</div>

<script>
function openSite(url) {
  document.getElementById('frame').src = url;
}

function openYouTube() {
  let video = prompt("Enter YouTube Video URL or ID:");

  if (!video) return;

  // Extract video ID if full URL is pasted
  let videoId = video;

  if (video.includes("youtube.com") || video.includes("youtu.be")) {
    let match = video.match(/(v=|\/)([a-zA-Z0-9_-]{11})/);
    if (match) videoId = match[2];
  }

  document.getElementById('frame').src =
    "https://www.youtube.com/embed/" + videoId;
}
</script>

</body>
</html>
